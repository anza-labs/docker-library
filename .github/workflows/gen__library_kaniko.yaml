jobs:
  build:
    env: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: shanduur-auto
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - run: |-
          docker \
              buildx \
              build \
              --load \
              --label=org.opencontainers.image.authors='anza-labs contributors' \
              --label=org.opencontainers.image.created='${{ github.event.created_at }}' \
              --label=org.opencontainers.image.revision='${{ github.sha }}' \
              --label=org.opencontainers.image.source='https://github.com/anza-labs/docker-library' \
              --label=org.opencontainers.image.url='${{ github.event.repository.html_url }}' \
              --label=org.opencontainers.image.vendor='anza-labs' \
              --target=${{ matrix.target }} \
              --build-arg=VERSION=${{ matrix.version }} \
              --build-arg=BASE_IMAGE=gcr.io/distroless/static:latest@sha256:47b2d72ff90843eb8a768b5c2f89b40741843b639d065b9b937b07cd59b479c6 \
              --platform=linux/${{ matrix.arch }} \
              --file=library/kaniko/Dockerfile \
              --tag=ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.arch }} \
              library/kaniko
      - run: |-
          docker \
              push \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.arch }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - if: ${{ matrix.version != 'latest' }}
        run: |-
          cosign \
              sign \
              --yes \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.arch }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        target:
          - executor
          - executor-debug
          - warmer
        version:
          - v1.25.15
  promote:
    env: {}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: shanduur-auto
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - run: |-
          docker \
              manifest \
              create \
              --amend \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }} \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-amd64 \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-arm64
      - run: |-
          docker \
              manifest \
              annotate \
              --arch=amd64 \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }} \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-amd64 && \
          docker \
              manifest \
              annotate \
              --arch=arm64 \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }} \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}-arm64
      - run: |-
          docker \
              manifest \
              push \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - if: ${{ matrix.version != 'latest' }}
        run: |-
          cosign \
              sign \
              --yes \
              ghcr.io/anza-labs/library/kaniko/${{ matrix.target }}:${{ matrix.version }}
    strategy:
      matrix:
        target:
          - executor
          - executor-debug
          - warmer
        version:
          - v1.25.15
name: release library/kaniko
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/gen__library_kaniko.yaml
      - library/kaniko/Dockerfile
      - library/kaniko/pkg.toml
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  packages: write
