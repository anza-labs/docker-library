jobs:
  build:
    env: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: shanduur-auto
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - run: |-
          docker \
              buildx \
              build \
              --load \
              --label=org.opencontainers.image.authors='anza-labs contributors' \
              --label=org.opencontainers.image.created='${{ github.event.created_at }}' \
              --label=org.opencontainers.image.revision='${{ github.sha }}' \
              --label=org.opencontainers.image.source='https://github.com/anza-labs/docker-library' \
              --label=org.opencontainers.image.url='${{ github.event.repository.html_url }}' \
              --label=org.opencontainers.image.vendor='anza-labs' \
              --target=${{ matrix.target }} \
              --build-arg=VERSION=${{ matrix.version }} \
              --build-arg=BASE_IMAGE=docker.io/library/alpine:edge@sha256:115729ec5cb049ba6359c3ab005ac742012d92bbaa5b8bc1a878f1e8f62c0cb8 \
              --platform=linux/${{ matrix.arch }} \
              --file=library/ldap-tools/Dockerfile \
              --tag=ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-${{ matrix.arch }} \
              library/ldap-tools
      - run: |-
          docker \
              push \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-${{ matrix.arch }}
      - run: curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_$(uname -s)_$(uname -m).tar.gz" | tar xz -C /usr/local/bin crane
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - if: ${{ matrix.version != 'latest' }}
        run: |-
          cosign \
              sign \
              --yes \
              ghcr.io/anza-labs/library/ldap-tools@$(crane digest ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-${{ matrix.arch }})
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
          - riscv64
        target:
          - image
        version:
          - latest
  promote:
    env: {}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: shanduur-auto
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - run: |-
          docker \
              manifest \
              create \
              --amend \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }} \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-amd64 \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-arm64 \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-riscv64
      - run: |-
          docker \
              manifest \
              annotate \
              --arch=amd64 \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }} \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-amd64 && \
          docker \
              manifest \
              annotate \
              --arch=arm64 \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }} \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-arm64 && \
          docker \
              manifest \
              annotate \
              --arch=riscv64 \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }} \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}-riscv64
      - run: |-
          docker \
              manifest \
              push \
              ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }}
      - run: curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_$(uname -s)_$(uname -m).tar.gz" | tar xz -C /usr/local/bin crane
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - if: ${{ matrix.version != 'latest' }}
        run: |-
          cosign \
              sign \
              --yes \
              ghcr.io/anza-labs/library/ldap-tools@$(crane digest ghcr.io/anza-labs/library/ldap-tools:${{ matrix.version }})
    strategy:
      matrix:
        target:
          - image
        version:
          - latest
name: release library/ldap-tools
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/gen__library_ldap-tools.yaml
      - library/ldap-tools/Dockerfile
      - library/ldap-tools/pkg.toml
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  packages: write
